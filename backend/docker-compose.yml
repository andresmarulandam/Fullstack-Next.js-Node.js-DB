version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: fullstack_challenge_db
    environment:
      POSTGRES_DB: fullstack_challenge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
